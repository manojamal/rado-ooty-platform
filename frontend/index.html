<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rado ஊT - Fresh from Ooty Hills</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span>🌿</span>
                <span>Rado ஊT</span>
                <span>Farm Fresh · Ooty Hills</span>
            </div>
            <button class="cart-icon" id="cartIcon">🛒 <span id="cartCount">0</span></button>
        </div>
    </nav>

    <div class="container">
        <div class="products-grid" id="productsGrid">
            <div class="loading">Loading fresh products...</div>
        </div>
        
        <div class="cart-sidebar" id="cartSidebar">
            <h3>Your Cart</h3>
            <div id="cartItems"></div>
            <div class="cart-total" id="cartTotal"></div>
            <button id="checkoutBtn" class="checkout-btn">Checkout</button>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
